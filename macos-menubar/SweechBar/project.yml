name: SweechBar
options:
  bundleIdPrefix: ai.sweech
  deploymentTarget:
    macOS: "13.0"

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  SweechBar:
    type: application
    platform: macOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.sweech.bar
        PRODUCT_NAME: SweechBar
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        INFOPLIST_FILE: Info.plist
        GENERATE_INFOPLIST_FILE: false

  SweechBarWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: WidgetSources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.sweech.bar.widget
        PRODUCT_NAME: SweechBarWidget
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: true

schemes:
  SweechBar:
    build:
      targets:
        SweechBar: all
        SweechBarWidget: all
