name: SweechBar
options:
  bundleIdPrefix: ai.vyke
  deploymentTarget:
    macOS: "13.0"

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  SweechBar:
    type: application
    platform: macOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.vyke.sweech
        PRODUCT_NAME: SweechBar
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: Info.plist
        GENERATE_INFOPLIST_FILE: false

  SweechBarWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: WidgetSources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.vyke.sweech.widget
        PRODUCT_NAME: SweechBarWidget
        CODE_SIGN_STYLE: Automatic
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: true

schemes:
  SweechBar:
    build:
      targets:
        SweechBar: all
        SweechBarWidget: all
    run:
      config: Debug
    archive:
      config: Release
