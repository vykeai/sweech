name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

  sweechbar:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build SweechBar
        run: |
          cd macos-menubar/SweechBar
          swift build

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Check for banned patterns
        run: |
          # No console.log in error paths (should use console.error)
          ! grep -rn 'console\.log.*error\|console\.log.*fail' src/ --include='*.ts' || true
          # No hardcoded localhost ports outside of fedServer
          ! grep -rn 'localhost:' src/ --include='*.ts' | grep -v fedServer | grep -v '// ' || true
